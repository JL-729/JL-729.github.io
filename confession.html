<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表白墙 - 星河记忆</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/galaxy.js"></script>
    <style>
        .lantern-text {
            color: #5d4037;
            font-size: 11px;
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            line-height: 1.3;
            word-break: break-all;
        }
        .detail-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 10px;
            color: #333;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.5);
        }
        .detail-card h3 {
            margin-top: 0;
            color: #ff9800;
        }
    </style>
</head>
<body>
    <canvas id="galaxy-canvas"></canvas>

    <nav class="glass">
        <div class="logo">✨ 星河记忆</div>
        <div class="links">
            <a href="index.html">首页</a>
            <a href="alumni.html">同学录</a>
            <a href="confession.html">表白墙</a>
            <a href="admin.html" id="admin-link" class="hidden">管理后台</a>
        </div>
    </nav>

    <main>
        <h1 style="text-align: center;">🏮 孔明灯寄语</h1>
        <p style="text-align: center;">让思念随风，升入星河</p>
        
        <div id="lantern-field" class="lantern-container glass">
            <!-- Lanterns will float here -->
        </div>

        <section class="glass" style="margin-top: 2rem; padding: 2rem;">
            <h2>放飞孔明灯</h2>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <textarea id="confession-text" placeholder="写下你的寄语..." class="glass" style="width: 100%; height: 250px !important; color: white; padding: 15px; box-sizing: border-box; border: 1px solid var(--glass-border); border-radius: 10px; background: rgba(255, 255, 255, 0.05); font-size: 14px; line-height: 1.6; resize: vertical; font-family: inherit;"></textarea>
                <button class="btn btn-primary" onclick="addConfession()" style="align-self: flex-end;">🚀 放飞</button>
            </div>
        </section>
    </main>

    <div id="preview-overlay" class="overlay">
        <div class="overlay-content"></div>
    </div>

    <script>
        // Lane management system for anti-overlap
        const LANE_COUNT = 12;
        const laneStates = [];
        for (let i = 0; i < LANE_COUNT; i++) {
            laneStates.push({ busy: false, lastPos: -500 });
        }

        function getAvailableLane() {
            // Find the lane with the lowest last position (most available)
            let bestLane = 0;
            let bestPos = Infinity;
            for (let i = 0; i < LANE_COUNT; i++) {
                if (!laneStates[i].busy && laneStates[i].lastPos < bestPos) {
                    bestPos = laneStates[i].lastPos;
                    bestLane = i;
                }
            }
            // If all lanes busy, pick the one with the lowest position
            if (bestPos === Infinity) {
                let minPos = Infinity;
                for (let i = 0; i < LANE_COUNT; i++) {
                    if (laneStates[i].lastPos < minPos) {
                        minPos = laneStates[i].lastPos;
                        bestLane = i;
                    }
                }
            }
            return bestLane;
        }

        async function loadConfessions() {
            let messagesList = [];
            try {
                const data = await Storage.readJSON('/db/confessions.json');
                if (data && Array.isArray(data) && data.length > 0) {
                    messagesList = data;
                }
            } catch (e) {
                console.warn('[Confession] 加载寄语失败，使用默认数据:', e);
            }
            
            if (messagesList.length === 0) {
                messagesList = [{text: "祝大家前程似锦"}, {text: "江湖再见"}, {text: "永远少年！"}, {text: "顶峰相见"}, {text: "感谢相遇"}];
            }
            
            // Create lanterns with staggered delays
            messagesList.forEach((m, i) => {
                setTimeout(() => createLantern(m.text), i * 1200);
            });
        }

        async function addConfession() {
            const text = document.getElementById('confession-text').value.trim();
            if (!text) {
                alert('请写下你的寄语');
                return;
            }

            if (!Auth.isLoggedIn()) {
                alert('请先登录后再放飞孔明灯');
                return;
            }

            try {
                let confessions = await Storage.readJSON('/db/confessions.json') || [];
                if (!Array.isArray(confessions)) confessions = [];
                
                confessions.push({
                    text,
                    createdAt: Date.now(),
                    author: Auth.getUser().username
                });
                
                await Storage.writeJSON('/db/confessions.json', confessions);
                document.getElementById('confession-text').value = '';
                createLantern(text);
            } catch (e) {
                console.error('[Confession] 保存寄语失败:', e);
                // Still show the lantern locally even if save fails
                document.getElementById('confession-text').value = '';
                createLantern(text);
            }
        }

        function createLantern(text) {
            const container = document.getElementById('lantern-field');
            const lantern = document.createElement('div');
            lantern.className = 'lantern';
            
            // Truncate text for display
            const displayText = text.length > 30 ? text.substring(0, 28) + '…' : text;
            lantern.innerHTML = `<div class="lantern-text">${displayText}</div>`;
            
            // Assign to a lane to prevent overlap
            const laneIndex = getAvailableLane();
            const laneWidth = 100 / LANE_COUNT;
            const laneCenter = laneIndex * laneWidth + laneWidth / 2;
            
            // Random position within lane with slight jitter
            const jitter = (Math.random() - 0.5) * laneWidth * 0.6;
            const startX = laneCenter + jitter;
            lantern.style.left = `${startX}%`;
            
            // Random rotation (subtle, for natural look)
            const rotation = (Math.random() - 0.5) * 8; // -4 to 4 degrees
            lantern.style.transform = `rotate(${rotation}deg)`;
            
            // Random animation duration and delay
            const duration = 16 + Math.random() * 8;
            const delay = Math.random() * 3;
            lantern.style.animationDuration = `${duration}s`;
            lantern.style.animationDelay = `${delay}s`;
            
            // Slightly randomize size
            const scale = 0.85 + Math.random() * 0.3;
            lantern.style.transform += ` scale(${scale})`;
            
            // Track lane state
            laneStates[laneIndex].busy = true;
            laneStates[laneIndex].lastPos = Date.now();
            
            lantern.onclick = () => {
                const overlay = document.getElementById('preview-overlay');
                overlay.querySelector('.overlay-content').innerHTML = `
                    <div class="detail-card">
                        <h3>🏮 寄语详情</h3>
                        <p style="font-size: 1.1rem; line-height: 1.6;">${text}</p>
                    </div>
                `;
                overlay.style.display = 'flex';
            };
            
            container.appendChild(lantern);
            
            // Remove and free lane after animation
            setTimeout(() => {
                lantern.remove();
                laneStates[laneIndex].busy = false;
                // Spawn replacement from existing confessions
                spawnRandomLantern();
            }, (duration + delay) * 1000);
        }

        async function spawnRandomLantern() {
            try {
                const data = await Storage.readJSON('/db/confessions.json');
                if (data && Array.isArray(data) && data.length > 0) {
                    const msg = data[Math.floor(Math.random() * data.length)];
                    createLantern(msg.text);
                }
            } catch (e) {
                // Silent fail
            }
        }

        // Periodic spawning to keep the sky lively
        setInterval(() => {
            const container = document.getElementById('lantern-field');
            const lanternCount = container.querySelectorAll('.lantern').length;
            if (lanternCount < 6) {
                spawnRandomLantern();
            }
        }, 5000);

        Galaxy.init();
        loadConfessions();

        document.getElementById('preview-overlay').onclick = function() {
            this.style.display = 'none';
        };

        // Auth check for admin link
        const user = Auth.getUser();
        if (user && (user.role === 'admin' || user.role === 'head')) {
            document.getElementById('admin-link').classList.remove('hidden');
        }
    </script>
</body>
</html>
