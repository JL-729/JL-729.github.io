<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 星河记忆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars-container">
        <div class="star-layer star-layer-1"></div>
        <div class="star-layer star-layer-2"></div>
        <div class="star-layer star-layer-3"></div>
    </div>

    <div style="display: flex; height: 100vh; align-items: center; justify-content: center;">
        <div class="glass card glow-border" style="width: 100%; max-width: 400px; padding: 2rem;">
            <h1 style="text-align: center; margin-bottom: 2rem;">登入星河</h1>
            <form id="login-form">
                <div style="margin-bottom: 1rem;">
                    <input type="text" id="username" placeholder="用户名" class="glass" style="width: 100%; box-sizing: border-box;" required>
                </div>
                <div style="margin-bottom: 2rem;">
                    <input type="password" id="password" placeholder="密码" class="glass" style="width: 100%; box-sizing: border-box;" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">开启记忆之门</button>
            </form>
            <div id="error-msg" style="color: #ff4d4d; text-align: center; margin-top: 1rem;"></div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            const res = await fetch('/api/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                if (data.role === 'head' || data.role === 'admin') {
                    location.href = 'admin.html';
                } else {
                    location.href = 'index.html';
                }
            } else {
                errorMsg.textContent = '用户名或密码错误';
            }
        };
    </script>
</body>
</html>
