<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 星河记忆</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-container { max-width: 400px; margin: 0 auto; padding: 120px 20px 40px; }
    .login-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow); }
    .login-card h1 { text-align: center; font-size: 1.6rem; margin-bottom: 8px; background: linear-gradient(135deg, var(--primary-light), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-card .subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }
    .form-error { color: var(--danger); font-size: 0.85rem; margin-top: -12px; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">✦ 星河记忆</a>
    <div class="nav-links">
      <a href="/" class="active">返回首页</a>
    </div>
  </nav>

  <div class="login-container">
    <div class="login-card">
      <h1>✦ 欢迎回来</h1>
      <p class="subtitle">登录以访问更多功能</p>

      <div class="form-error" id="formError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" class="form-input" id="username" placeholder="请输入用户名" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" class="form-input" id="password" placeholder="请输入密码" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">登 录</button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:0.85rem;color:var(--text-muted)">
        默认管理员账号: admin / admin123
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // 如果已登录则跳转
    if (localStorage.getItem('token')) {
      window.location.href = '/';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('formError');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '登录中...';

      try {
        const data = await API.login(username, password);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast('登录成功！', 'success');
        setTimeout(() => {
          window.location.href = '/';
        }, 500);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    });
  </script>
</body>
</html>
