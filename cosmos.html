<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小宇宙 - 星河记忆</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/galaxy.js"></script>
    <style>
        .cosmos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 1rem 0;
        }
        .cosmos-card {
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .cosmos-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 32px 0 rgba(125, 95, 255, 0.4);
        }
        .cosmos-card .cosmos-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .cosmos-card .cosmos-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .cosmos-card .cosmos-meta {
            font-size: 0.85rem;
            opacity: 0.6;
        }

        /* Space Detail View */
        .space-detail {
            display: none;
        }
        .space-detail.active {
            display: block;
        }
        .space-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .space-header h2 {
            margin: 0;
        }
        .back-btn {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: white;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            background: var(--glass-bg);
        }

        /* Chat Room */
        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .chat-msg {
            padding: 0.6rem 1rem;
            border-radius: 15px;
            max-width: 80%;
            word-break: break-word;
            line-height: 1.5;
            font-size: 0.9rem;
        }
        .chat-msg.self {
            background: var(--primary-color);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-msg.other {
            background: rgba(255,255,255,0.1);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-msg .chat-author {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-bottom: 2px;
        }
        .chat-msg .chat-time {
            font-size: 0.65rem;
            opacity: 0.4;
            text-align: right;
            margin-top: 2px;
        }

        .chat-input-area {
            display: flex;
            gap: 0.5rem;
        }
        .chat-input-area input {
            flex: 1;
            padding: 0.8rem 1rem;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .chat-input-area input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .chat-input-area button {
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            border: none;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
        }
        .chat-input-area button:hover {
            filter: brightness(1.2);
        }

        /* Exhibition within space */
        .space-exhibition {
            margin-top: 2rem;
        }
        .space-exhibition .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .space-exhibition .grid .card {
            padding: 0.5rem;
        }
        .space-exhibition .grid .card img,
        .space-exhibition .grid .card video {
            width: 100%;
            border-radius: 8px;
            max-height: 200px;
            object-fit: cover;
        }

        /* Create space form */
        .create-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        .create-form input {
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .create-form input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .emoji-picker {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .emoji-picker span {
            cursor: pointer;
            font-size: 1.2rem;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .emoji-picker span:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <canvas id="galaxy-canvas"></canvas>

    <nav class="glass">
        <div class="logo">✨ 星河记忆</div>
        <div class="links">
            <a href="index.html">首页</a>
            <a href="alumni.html">同学录</a>
            <a href="lanterns.html">孔明灯</a><a href="blog.html">星河博客</a>
            <a href="cosmos.html">小宇宙</a>
            <a href="admin.html" id="admin-link" class="hidden">管理后台</a>
            <a href="login.html" id="login-link">登录</a>
            <a href="#" id="logout-link" class="hidden">注销</a>
        </div>
    </nav>

    <main>
        <div id="space-list-view">
            <h1 style="text-align: center;">🌌 小宇宙</h1>
            <p style="text-align: center; opacity: 0.7;">每个小宇宙，都是一个独特的故事</p>

            <div id="cosmos-grid" class="cosmos-grid">
                <p style="text-align:center;grid-column:1/-1;opacity:0.6;">加载中...</p>
            </div>

            <div id="create-section" class="hidden">
                <section class="glass create-form">
                    <h2 style="margin:0;">✨ 创建新空间</h2>
                    <input type="text" id="new-space-name" placeholder="空间名称 (如: 三年二班、篮球小分队)" class="glass">
                    <input type="text" id="new-space-desc" placeholder="空间描述（可选）" class="glass">
                    <button class="btn btn-primary" onclick="createSpace()">🚀 创建</button>
                </section>
            </div>
        </div>

        <div id="space-detail-view" class="space-detail">
            <div class="space-header">
                <button class="back-btn" onclick="backToList()">← 返回</button>
                <h2 id="space-title">小宇宙</h2>
            </div>

            <!-- Chat Room -->
            <section class="glass" style="padding: 1rem;">
                <h3 style="margin-top:0;">💬 聊天室</h3>
                <div id="chat-messages" class="chat-container"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="发送消息..." onkeydown="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()">发送</button>
                </div>
                <div class="emoji-picker" id="emoji-picker">
                    <span onclick="insertEmoji('😊')">😊</span>
                    <span onclick="insertEmoji('😂')">😂</span>
                    <span onclick="insertEmoji('🥰')">🥰</span>
                    <span onclick="insertEmoji('😎')">😎</span>
                    <span onclick="insertEmoji('🌟')">🌟</span>
                    <span onclick="insertEmoji('✨')">✨</span>
                    <span onclick="insertEmoji('🎉')">🎉</span>
                    <span onclick="insertEmoji('💪')">💪</span>
                    <span onclick="insertEmoji('❤️')">❤️</span>
                    <span onclick="insertEmoji('🙏')">🙏</span>
                    <span onclick="insertEmoji('🎂')">🎂</span>
                    <span onclick="insertEmoji('🌸')">🌸</span>
                </div>
            </section>

            <!-- Space Exhibition -->
            <section class="glass space-exhibition" style="padding: 1rem; margin-top: 1.5rem;">
                <h3 style="margin-top:0;">🖼️ 回忆展</h3>
                <div id="space-exhibition-grid" class="grid">
                    <p style="text-align:center;grid-column:1/-1;opacity:0.6;">暂无展览内容</p>
                </div>
                <div style="margin-top:1rem;" class="hidden" id="space-upload-section">
                    <input type="file" id="space-media-upload" accept="image/*,video/*">
                    <button class="btn btn-primary" onclick="uploadSpaceMedia()" style="margin-top:0.5rem;">📤 上传</button>
                </div>
            </section>
        </div>
    </main>

    <div id="preview-overlay" class="overlay">
        <div class="overlay-content"></div>
    </div>

    <script>
        let currentSpace = null;
        let chatPollInterval = null;

        // ========== Space List ==========
        async function loadSpaces() {
            const grid = document.getElementById('cosmos-grid');
            const user = Auth.getUser();

            // Show create button for head/admin
            if (user && (user.role === 'head' || user.role === 'admin')) {
                document.getElementById('create-section').classList.remove('hidden');
            }

            try {
                const files = await Storage.list('/cosmos');
                if (!files || files.length === 0) {
                    grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;opacity:0.6;">🌌 还没有小宇宙，等待总管创建...</p>';
                    return;
                }

                grid.innerHTML = '';
                for (const filePath of files) {
                    const name = decodeURIComponent(filePath.replace(/\/+$/, '').split('/').pop());
                    if (!name || name === 'media') continue;

                    // Try to load space config
                    let displayName = name;
                    let displayDesc = '';
                    try {
                        const config = await Storage.readJSON(`/cosmos/${name}/config.json`);
                        if (config) {
                            displayName = config.name || name;
                            displayDesc = config.description || '';
                        }
                    } catch (e) { /* use folder name */ }

                    const card = document.createElement('div');
                    card.className = 'cosmos-card glass glow-border';
                    card.innerHTML = `
                        <div class="cosmos-icon">🌍</div>
                        <div class="cosmos-name">${escapeHtml(displayName)}</div>
                        ${displayDesc ? `<div class="cosmos-meta">${escapeHtml(displayDesc)}</div>` : ''}
                    `;
                    card.onclick = () => openSpace(name, displayName);
                    grid.appendChild(card);
                }
            } catch (e) {
                console.warn('[Cosmos] 加载空间列表失败:', e);
                grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;opacity:0.6;">😴 加载失败</p>';
            }
        }

        async function createSpace() {
            const name = document.getElementById('new-space-name').value.trim();
            const desc = document.getElementById('new-space-desc').value.trim();

            if (!name) { alert('请输入空间名称'); return; }

            const user = Auth.getUser();
            if (!user) { alert('请先登录'); return; }

            try {
                await Storage.mkdir(`/cosmos/${name}`);
                await Storage.mkdir(`/cosmos/${name}/media`);

                // Create config
                await Storage.writeJSON(`/cosmos/${name}/config.json`, {
                    name,
                    description: desc,
                    createdBy: user.username,
                    createdAt: Date.now()
                });

                // Create empty chat
                await Storage.writeJSON(`/cosmos/${name}/chat.json`, { messages: [] });

                document.getElementById('new-space-name').value = '';
                document.getElementById('new-space-desc').value = '';
                alert('✅ 小宇宙创建成功！');
                loadSpaces();
            } catch (e) {
                console.error('[Cosmos] 创建失败:', e);
                alert('创建失败: ' + e.message);
            }
        }

        // ========== Space Detail ==========
        async function openSpace(name, displayName) {
            currentSpace = name;
            document.getElementById('space-list-view').style.display = 'none';
            document.getElementById('space-detail-view').classList.add('active');
            document.getElementById('space-title').textContent = `🌍 ${displayName}`;

            // Show upload for logged-in users
            const user = Auth.getUser();
            if (user) {
                document.getElementById('space-upload-section').classList.remove('hidden');
            }

            // Load chat
            loadChat();
            // Start polling
            if (chatPollInterval) clearInterval(chatPollInterval);
            chatPollInterval = setInterval(loadChat, 4000);

            // Load exhibition
            loadSpaceExhibition();
        }

        function backToList() {
            currentSpace = null;
            document.getElementById('space-list-view').style.display = 'block';
            document.getElementById('space-detail-view').classList.remove('active');
            if (chatPollInterval) {
                clearInterval(chatPollInterval);
                chatPollInterval = null;
            }
        }

        // ========== Chat ==========
        async function loadChat() {
            if (!currentSpace) return;
            const container = document.getElementById('chat-messages');
            const user = Auth.getUser();

            try {
                const data = await Storage.readJSON(`/cosmos/${currentSpace}/chat.json`);
                const messages = data && data.messages ? data.messages : [];

                // Only scroll to bottom if we're adding new messages
                const shouldScroll = container.scrollTop + container.clientHeight >= container.scrollHeight - 50;

                container.innerHTML = '';
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    const isSelf = user && msg.author === user.username;
                    div.className = `chat-msg ${isSelf ? 'self' : 'other'}`;
                    div.innerHTML = `
                        <div class="chat-author">${escapeHtml(msg.author)}</div>
                        ${escapeHtml(msg.text)}
                        <div class="chat-time">${msg.createdAt ? new Date(msg.createdAt).toLocaleTimeString() : ''}</div>
                    `;
                    container.appendChild(div);
                });

                if (shouldScroll) {
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) {
                // Silent fail for polling
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !currentSpace) return;

            const user = Auth.getUser();
            if (!user) { alert('请先登录'); return; }

            try {
                const data = await Storage.readJSON(`/cosmos/${currentSpace}/chat.json`) || { messages: [] };
                if (!data.messages) data.messages = [];

                data.messages.push({
                    author: user.username,
                    text,
                    createdAt: Date.now()
                });

                await Storage.writeJSON(`/cosmos/${currentSpace}/chat.json`, data);
                input.value = '';
                loadChat();
            } catch (e) {
                console.error('[Cosmos] 发送消息失败:', e);
                alert('发送失败: ' + e.message);
            }
        }

        function insertEmoji(emoji) {
            const input = document.getElementById('chat-input');
            input.value += emoji;
            input.focus();
        }

        // ========== Space Exhibition ==========
        async function loadSpaceExhibition() {
            if (!currentSpace) return;
            const grid = document.getElementById('space-exhibition-grid');

            try {
                const files = await Storage.list(`/cosmos/${currentSpace}/media`);
                if (!files || files.length === 0) {
                    grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;opacity:0.6;">📷 暂无上传内容</p>';
                    return;
                }

                grid.innerHTML = '';
                const baseUrl = getBaseUrl();

                for (const filePath of files) {
                    const name = decodeURIComponent(filePath.split('/').pop());
                    if (!name) continue;

                    const fileUrl = `${baseUrl}/cosmos/${currentSpace}/media/${name}`;
                    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(name);
                    const card = document.createElement('div');
                    card.className = 'card glass';

                    if (isImage) {
                        card.innerHTML = `<img src="${fileUrl}" alt="${name}" onclick="previewMedia('${fileUrl}')">`;
                    } else if (/\.(mp4|webm)$/i.test(name)) {
                        card.innerHTML = `<video src="${fileUrl}" muted controls></video>`;
                    } else {
                        continue;
                    }
                    grid.appendChild(card);
                }
            } catch (e) {
                console.warn('[Cosmos] 加载展览失败:', e);
            }
        }

        async function uploadSpaceMedia() {
            const input = document.getElementById('space-media-upload');
            if (!input.files.length || !currentSpace) return;

            const file = input.files[0];
            const ext = file.name.split('.').pop();
            const fileName = `media_${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;

            try {
                const baseUrl = getBaseUrl();
                const auth = getAuthHeader();
                const uploadPath = `/cosmos/${currentSpace}/media/${fileName}`;
                const fullUrl = `${baseUrl}${uploadPath}`;

                const res = await fetch(fullUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Basic ${auth}`,
                        'Content-Type': file.type || 'application/octet-stream'
                    },
                    body: file
                });

                if (!res.ok) throw new Error('上传失败');
                input.value = '';
                alert('✅ 上传成功');
                loadSpaceExhibition();
            } catch (e) {
                console.error('[Cosmos] 上传失败:', e);
                alert('上传失败: ' + e.message);
            }
        }

        // ========== Utilities ==========
        function getBaseUrl() {
            if (!GALAXY_WEBDAV_URL) return '';
            const url = GALAXY_WEBDAV_URL.replace(/\/+$/, '');
            try {
                const parsed = new URL(url);
                return `${parsed.protocol}//${parsed.host}${parsed.pathname}`.replace(/\/+$/, '');
            } catch { return url; }
        }

        function getAuthHeader() {
            if (!GALAXY_WEBDAV_URL) return '';
            const match = GALAXY_WEBDAV_URL.match(/https?:\/\/([^:]+):([^@]+)@/);
            if (match) return btoa(`${match[1]}:${match[2]}`);
            return '';
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function previewMedia(url) {
            const overlay = document.getElementById('preview-overlay');
            overlay.querySelector('.overlay-content').innerHTML = `<img src="${url}" style="max-width:100%;max-height:100%;border-radius:10px;">`;
            overlay.style.display = 'flex';
        }

        document.getElementById('preview-overlay').onclick = function() { this.style.display = 'none'; };
        document.getElementById('logout-link').onclick = (e) => { e.preventDefault(); Auth.logout(); location.reload(); };

        // ========== Init ==========
        Galaxy.init();

        const user = Auth.getUser();
        if (user) {
            document.getElementById('login-link').classList.add('hidden');
            if (user.role === 'admin' || user.role === 'head') {
                document.getElementById('admin-link').classList.remove('hidden');
            }
        }

        loadSpaces();
    </script>
</body>
</html>
