<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - 星河记忆</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-container { padding-top: 80px; }
    .admin-header { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 32px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .admin-header h1 { font-size: 1.4rem; }
    .admin-header .user-info { font-size: 0.9rem; color: var(--text-muted); }
    .admin-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; overflow-x: auto; }
    .admin-tab { padding: 10px 20px; border: none; background: none; color: var(--text-muted); cursor: pointer; border-radius: 8px; font-size: 0.9rem; transition: all 0.3s; white-space: nowrap; font-family: inherit; }
    .admin-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .admin-tab.active { color: white; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
    .admin-content { display: none; }
    .admin-content.active { display: block; }
    .data-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .data-card .item-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .modal { max-width: 520px; }
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
    .stat-card .num { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--primary-light), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-card .label { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">✦ 星河记忆</a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/admin.html" class="active">管理</a>
      <a href="/print-tickets.html">打印账号</a>
      <a href="#" onclick="logout()">退出</a>
    </div>
  </nav>

  <div class="container admin-container">
    <div class="admin-header">
      <div>
        <h1>⚙️ 后台管理</h1>
        <div class="user-info" id="userInfo"></div>
      </div>
      <div style="display:flex;gap:8px">
        <a href="/print-tickets.html" class="btn btn-secondary btn-sm">🖨️ 打印账号</a>
        <button class="btn btn-secondary btn-sm" onclick="loadAll()">刷新数据</button>
      </div>
    </div>

    <!-- 统计 -->
    <div class="stat-cards" id="statCards">
      <div class="stat-card"><div class="num" id="statAlumni">0</div><div class="label">同学录</div></div>
      <div class="stat-card"><div class="num" id="statExhibition">0</div><div class="label">展览作品</div></div>
      <div class="stat-card"><div class="num" id="statConfessions">0</div><div class="label">表白</div></div>
      <div class="stat-card"><div class="num" id="statAccounts">0</div><div class="label">账号</div></div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('accounts', this)">👤 账号管理</button>
      <button class="admin-tab" onclick="switchTab('alumni', this)">📖 同学录</button>
      <button class="admin-tab" onclick="switchTab('exhibition', this)">🖼️ 展览馆</button>
      <button class="admin-tab" onclick="switchTab('confessions', this)">💌 表白墙</button>
    </div>

    <!-- Accounts Tab -->
    <div class="admin-content active" id="tab-accounts">
      <div class="actions-bar">
        <h3>👤 账号列表</h3>
        <button class="btn btn-primary btn-sm" onclick="showAddAccount()">+ 添加账号</button>
      </div>
      <div id="accountsList" class="table-container"></div>
    </div>

    <!-- Alumni Tab -->
    <div class="admin-content" id="tab-alumni">
      <div class="actions-bar">
        <h3>📖 同学录</h3>
        <button class="btn btn-secondary btn-sm" onclick="loadAlumni()">刷新</button>
      </div>
      <div id="alumniList" class="table-container"></div>
    </div>

    <!-- Exhibition Tab -->
    <div class="admin-content" id="tab-exhibition">
      <div class="actions-bar">
        <h3>🖼️ 展览作品</h3>
        <button class="btn btn-secondary btn-sm" onclick="loadExhibition()">刷新</button>
      </div>
      <div id="exhibitionList" class="table-container"></div>
    </div>

    <!-- Confessions Tab -->
    <div class="admin-content" id="tab-confessions">
      <div class="actions-bar">
        <h3>💌 表白</h3>
        <button class="btn btn-secondary btn-sm" onclick="loadConfessions()">刷新</button>
      </div>
      <div id="confessionsList" class="table-container"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
    <div class="modal" id="modalContent" onclick="event.stopPropagation()">
      <h2 id="modalTitle">添加账号</h2>
      <form id="modalForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>用户名 *</label>
          <input type="text" class="form-input" id="editUsername" required>
        </div>
        <div class="form-group">
          <label>密码 *</label>
          <input type="text" class="form-input" id="editPassword" placeholder="留空则不修改（编辑时）">
        </div>
        <div class="form-group">
          <label>显示名称</label>
          <input type="text" class="form-input" id="editName" placeholder="显示名称">
        </div>
        <div class="form-group">
          <label>角色</label>
          <select class="form-select" id="editRole">
            <option value="user">普通用户</option>
            <option value="admin">管理员</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="modalSubmit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const user = checkAuth(true);
    document.getElementById('userInfo').textContent = `管理员: ${user.name} (@${user.username})`;

    function switchTab(name, btn) {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${name}`).classList.add('active');
    }

    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('modalOverlay').style.display = 'none';
    }

    // === Accounts ===
    function showAddAccount(data) {
      const overlay = document.getElementById('modalOverlay');
      const title = document.getElementById('modalTitle');
      const submit = document.getElementById('modalSubmit');
      if (data) {
        title.textContent = '编辑账号';
        submit.textContent = '保存修改';
        document.getElementById('editId').value = data.id;
        document.getElementById('editUsername').value = data.username;
        document.getElementById('editPassword').value = '';
        document.getElementById('editPassword').placeholder = '留空则不修改密码';
        document.getElementById('editName').value = data.name || '';
        document.getElementById('editRole').value = data.role || 'user';
      } else {
        title.textContent = '添加账号';
        submit.textContent = '添加';
        document.getElementById('editId').value = '';
        document.getElementById('editUsername').value = '';
        document.getElementById('editPassword').value = '';
        document.getElementById('editPassword').placeholder = '密码';
        document.getElementById('editName').value = '';
        document.getElementById('editRole').value = 'user';
      }
      overlay.style.display = 'flex';
    }

    document.getElementById('modalForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submit = document.getElementById('modalSubmit');
      submit.disabled = true;
      submit.textContent = '保存中...';

      const id = document.getElementById('editId').value;
      const data = {
        username: document.getElementById('editUsername').value.trim(),
        password: document.getElementById('editPassword').value,
        name: document.getElementById('editName').value.trim(),
        role: document.getElementById('editRole').value,
      };

      try {
        if (id) {
          if (!data.password) delete data.password;
          await API.updateAccount(id, data);
          showToast('账号修改成功', 'success');
        } else {
          await API.addAccount(data);
          showToast('账号添加成功', 'success');
        }
        closeModal();
        loadAccounts();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        submit.disabled = false;
        submit.textContent = id ? '保存修改' : '添加';
      }
    });

    async function deleteAccount(id, username) {
      if (id === 1) {
        showToast('不能删除默认管理员', 'error');
        return;
      }
      if (!confirm(`确定要删除账号 "${username}" 吗？`)) return;
      try {
        await API.deleteAccount(id);
        showToast('账号已删除', 'success');
        loadAccounts();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function loadAccounts() {
      const list = document.getElementById('accountsList');
      list.innerHTML = '<div class="loading" style="padding:40px">加载中</div>';
      try {
        const data = await API.getAccounts();
        document.getElementById('statAccounts').textContent = data.length;
        if (data.length === 0) {
          list.innerHTML = '<div class="empty-state" style="padding:40px"><p>暂无账号</p></div>';
          return;
        }
        list.innerHTML = `
          <table>
            <thead><tr><th>ID</th><th>用户名</th><th>名称</th><th>角色</th><th>创建时间</th><th>操作</th></tr></thead>
            <tbody>
              ${data.map(a => `
                <tr>
                  <td>${a.id}</td>
                  <td>${escapeHtml(a.username)}</td>
                  <td>${escapeHtml(a.name || '')}</td>
                  <td><span class="badge ${a.role === 'admin' ? 'badge-admin' : 'badge-user'}">${a.role === 'admin' ? '管理员' : '用户'}</span></td>
                  <td style="font-size:0.85rem;color:var(--text-muted)">${formatDate(a.createdAt)}</td>
                  <td>
                    <div class="item-actions">
                      <button class="btn btn-secondary btn-sm" onclick="showAddAccount(${JSON.stringify(a).replace(/"/g, '&quot;')})">编辑</button>
                      ${a.id !== 1 ? `<button class="btn btn-danger btn-sm" onclick="deleteAccount(${a.id}, '${escapeHtml(a.username)}')">删除</button>` : ''}
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        list.innerHTML = `<div class="empty-state" style="padding:40px"><p>${err.message}</p></div>`;
      }
    }

    // === Alumni ===
    async function loadAlumni() {
      const list = document.getElementById('alumniList');
      list.innerHTML = '<div class="loading" style="padding:40px">加载中</div>';
      try {
        const data = await API.getAlumni();
        document.getElementById('statAlumni').textContent = data.length;
        if (data.length === 0) {
          list.innerHTML = '<div class="empty-state" style="padding:40px"><p>暂无同学录信息</p></div>';
          return;
        }
        list.innerHTML = `
          <table>
            <thead><tr><th>姓名</th><th>班级</th><th>毕业年份</th><th>联系方式</th><th>留言</th><th>时间</th><th>操作</th></tr></thead>
            <tbody>
              ${data.map(item => `
                <tr>
                  <td>${escapeHtml(item.name)}</td>
                  <td>${escapeHtml(item.class || '-')}</td>
                  <td>${escapeHtml(item.graduationYear || '-')}</td>
                  <td style="font-size:0.85rem">${escapeHtml(item.contact || '-')}</td>
                  <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(item.message || '-')}</td>
                  <td style="font-size:0.85rem;color:var(--text-muted)">${formatDate(item.createdAt)}</td>
                  <td><button class="btn btn-danger btn-sm" onclick="deleteAlumni('${item.id}')">删除</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        list.innerHTML = `<div class="empty-state" style="padding:40px"><p>${err.message}</p></div>`;
      }
    }

    async function deleteAlumni(id) {
      if (!confirm('确定要删除这条记录吗？')) return;
      try {
        await API.deleteAlumni(id);
        showToast('已删除', 'success');
        loadAlumni();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // === Exhibition ===
    async function loadExhibition() {
      const list = document.getElementById('exhibitionList');
      list.innerHTML = '<div class="loading" style="padding:40px">加载中</div>';
      try {
        const data = await API.getExhibitions();
        document.getElementById('statExhibition').textContent = data.length;
        if (data.length === 0) {
          list.innerHTML = '<div class="empty-state" style="padding:40px"><p>暂无作品</p></div>';
          return;
        }
        list.innerHTML = `
          <table>
            <thead><tr><th>标题</th><th>作者</th><th>类型</th><th>描述</th><th>时间</th><th>操作</th></tr></thead>
            <tbody>
              ${data.map(item => `
                <tr>
                  <td>${escapeHtml(item.title)}</td>
                  <td>${escapeHtml(item.author || '匿名')}</td>
                  <td>${item.type}</td>
                  <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(item.description || '-')}</td>
                  <td style="font-size:0.85rem;color:var(--text-muted)">${formatDate(item.createdAt)}</td>
                  <td><button class="btn btn-danger btn-sm" onclick="deleteExhibition('${item.id}')">删除</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        list.innerHTML = `<div class="empty-state" style="padding:40px"><p>${err.message}</p></div>`;
      }
    }

    async function deleteExhibition(id) {
      if (!confirm('确定要删除这条记录吗？')) return;
      try {
        await API.deleteExhibition(id);
        showToast('已删除', 'success');
        loadExhibition();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // === Confessions ===
    async function loadConfessions() {
      const list = document.getElementById('confessionsList');
      list.innerHTML = '<div class="loading" style="padding:40px">加载中</div>';
      try {
        const data = await API.getConfessions();
        document.getElementById('statConfessions').textContent = data.length;
        if (data.length === 0) {
          list.innerHTML = '<div class="empty-state" style="padding:40px"><p>暂无表白</p></div>';
          return;
        }
        list.innerHTML = `
          <table>
            <thead><tr><th>来自</th><th>对象</th><th>内容</th><th>匿名</th><th>时间</th><th>操作</th></tr></thead>
            <tbody>
              ${data.map(item => `
                <tr>
                  <td>${escapeHtml(item.from)}</td>
                  <td>${escapeHtml(item.to)}</td>
                  <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(item.content)}</td>
                  <td>${item.anonymous ? '✅' : '❌'}</td>
                  <td style="font-size:0.85rem;color:var(--text-muted)">${formatDate(item.createdAt)}</td>
                  <td><button class="btn btn-danger btn-sm" onclick="deleteConfession('${item.id}')">删除</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        list.innerHTML = `<div class="empty-state" style="padding:40px"><p>${err.message}</p></div>`;
      }
    }

    async function deleteConfession(id) {
      if (!confirm('确定要删除这条表白吗？')) return;
      try {
        await API.deleteConfession(id);
        showToast('已删除', 'success');
        loadConfessions();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function loadAll() {
      loadAccounts();
      loadAlumni();
      loadExhibition();
      loadConfessions();
    }

    loadAll();
  </script>
</body>
</html>
