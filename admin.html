<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 星河记忆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars-container">
        <div class="star-layer star-layer-1"></div>
        <div class="star-layer star-layer-2"></div>
        <div class="star-layer star-layer-3"></div>
    </div>

    <nav class="glass">
        <div class="logo">✨ 星河后台</div>
        <div class="links">
            <a href="index.html">首页</a>
            <a href="#" id="logout-link">注销</a>
        </div>
    </nav>

    <main>
        <section class="glass admin-section" id="info-section">
            <h2>欢迎, <span id="current-user">加载中...</span></h2>
            <p>角色: <span id="current-role">加载中...</span></p>
        </section>

        <!-- Head Only: Account Management -->
        <section class="glass admin-section hidden" id="head-section">
            <h2>账号管理 (总管)</h2>
            <div style="margin-bottom: 1rem;">
                <input type="text" id="new-username" placeholder="用户名" class="glass">
                <input type="password" id="new-password" placeholder="密码" class="glass">
                <select id="new-role" class="glass">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="btn btn-primary" onclick="addAccount()">添加账号</button>
                <a href="print-tickets.html" class="btn btn-success" style="text-decoration:none;">打印凭据</a>
            </div>
            <table id="accounts-table">
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="accounts-body"></tbody>
            </table>
        </section>

        <!-- Admin/Head: Content Approval -->
        <section class="glass admin-section hidden" id="admin-section">
            <h2>内容审批</h2>
            <div id="pending-list" class="grid">
                <!-- Pending items -->
            </div>
        </section>

        <!-- All Users: Change Password -->
        <section class="glass admin-section">
            <h2>修改密码</h2>
            <div>
                <input type="password" id="change-new-password" placeholder="新密码" class="glass">
                <button class="btn btn-primary" onclick="changePassword()">提交修改</button>
            </div>
        </section>
    </main>

    <script>
        let currentUser = null;

        async function init() {
            const res = await fetch('/api/me');
            if (!res.ok) {
                location.href = 'login.html';
                return;
            }
            currentUser = await res.json();
            document.getElementById('current-user').textContent = currentUser.username;
            document.getElementById('current-role').textContent = currentUser.role;

            if (currentUser.role === 'head') {
                document.getElementById('head-section').classList.remove('hidden');
                loadAccounts();
            }
            if (currentUser.role === 'head' || currentUser.role === 'admin') {
                document.getElementById('admin-section').classList.remove('hidden');
                loadPending();
            }
        }

        // Account Management
        async function loadAccounts() {
            const res = await fetch('/api/accounts');
            const accounts = await res.json();
            const tbody = document.getElementById('accounts-body');
            tbody.innerHTML = '';
            accounts.forEach(acc => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${acc.username}</td>
                    <td>${acc.role}</td>
                    <td>${new Date(acc.createdAt).toLocaleString()}</td>
                    <td>
                        <button class="btn btn-danger" onclick="deleteAccount('${acc.username}')">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function addAccount() {
            const username = document.getElementById('new-username').value;
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;
            const res = await fetch('/api/accounts', {
                method: 'POST',
                body: JSON.stringify({ username, password, role })
            });
            if (res.ok) {
                alert('添加成功');
                loadAccounts();
            } else {
                const err = await res.json();
                alert('错误: ' + err.error);
            }
        }

        async function deleteAccount(username) {
            if (!confirm('确定删除?')) return;
            const res = await fetch('/api/accounts', {
                method: 'DELETE',
                body: JSON.stringify({ username })
            });
            if (res.ok) loadAccounts();
        }

        // Content Approval
        async function loadPending() {
            const res = await fetch('/api/content?type=pending');
            const items = await res.json();
            const container = document.getElementById('pending-list');
            container.innerHTML = '';
            
            if (items.length === 0) {
                container.innerHTML = '<p>暂无待审批内容</p>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card glass';
                
                const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(item.name);
                const media = isImage ? `<img src="${item.url}">` : `<video src="${item.url}" controls>`;
                
                card.innerHTML = `
                    ${media}
                    <p>上传者: ${item.uploader}</p>
                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-success" onclick="approveContent('${item.name}')">通过</button>
                        <button class="btn btn-danger" onclick="rejectContent('${item.name}')">驳回</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function approveContent(name) {
            const res = await fetch('/api/content', {
                method: 'POST',
                body: JSON.stringify({ name, action: 'approve' })
            });
            if (res.ok) {
                alert('已通过');
                loadPending();
            } else {
                const err = await res.json();
                alert('错误: ' + err.error);
            }
        }

        async function rejectContent(name) {
            const res = await fetch('/api/content', {
                method: 'DELETE',
                body: JSON.stringify({ name, type: 'pending' })
            });
            if (res.ok) loadPending();
        }

        // Password
        async function changePassword() {
            const newPassword = document.getElementById('change-new-password').value;
            const res = await fetch('/api/password', {
                method: 'POST',
                body: JSON.stringify({ newPassword })
            });
            if (res.ok) alert('修改成功');
            else {
                const err = await res.json();
                alert('错误: ' + err.error);
            }
        }

        document.getElementById('logout-link').onclick = async (e) => {
            e.preventDefault();
            await fetch('/api/logout');
            location.href = 'login.html';
        };

        init();
    </script>
</body>
</html>
