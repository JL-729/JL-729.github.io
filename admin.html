<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 星河记忆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>⚙️ 管理后台</h1>
        <nav>
            <a href="index.html">首页</a>
            <a href="#" id="logout-link">注销</a>
        </nav>
    </header>
    <main>
        <section id="approval-section" class="card hidden">
            <h2>待审核内容 (展览馆)</h2>
            <table>
                <thead>
                    <tr>
                        <th>文件名</th>
                        <th>上传者</th>
                        <th>上传时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="pending-list"></tbody>
            </table>
        </section>

        <section id="account-section" class="card hidden">
            <h2>账号管理</h2>
            <form id="create-account-form" style="margin-bottom: 2rem;">
                <input type="text" id="new-username" placeholder="用户名" required>
                <input type="text" id="new-password" placeholder="初始密码" required>
                <select id="new-role">
                    <option value="user">用户 (User)</option>
                    <option value="admin">管理员 (Admin)</option>
                    <option value="head">总管 (Head)</option>
                </select>
                <button type="submit">创建账号</button>
            </form>
            <button onclick="location.href='print-tickets.html'" style="margin-bottom: 1rem;">打印账号凭据</button>
            <table>
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="account-list"></tbody>
            </table>
        </section>
    </main>

    <script>
        let currentUser = null;

        async function init() {
            const res = await fetch('/api/me');
            if (!res.ok) {
                location.href = 'login.html';
                return;
            }
            currentUser = await res.json();
            
            if (currentUser.role === 'admin' || currentUser.role === 'head') {
                document.getElementById('approval-section').classList.remove('hidden');
                loadPending();
            }

            if (currentUser.role === 'head') {
                document.getElementById('account-section').classList.remove('hidden');
                loadAccounts();
            }
        }

        async function loadPending() {
            const res = await fetch('/api/pending');
            if (res.ok) {
                const list = await res.json();
                const tbody = document.getElementById('pending-list');
                tbody.innerHTML = '';
                list.forEach(obj => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><a href="/${obj.key}" target="_blank">${obj.key.split('/').pop()}</a></td>
                        <td>${obj.customMetadata?.uploader || '未知'}</td>
                        <td>${new Date(parseInt(obj.customMetadata?.uploadedAt || 0)).toLocaleString()}</td>
                        <td>
                            <button onclick="approve('${obj.key}')">通过</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        async function approve(key) {
            const filename = key.split('/').pop();
            const res = await fetch('/api/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename })
            });
            if (res.ok) {
                alert('审核通过');
                loadPending();
            } else {
                const msg = await res.text();
                alert('审核失败: ' + msg);
            }
        }

        async function loadAccounts() {
            const res = await fetch('/api/accounts');
            if (res.ok) {
                const accounts = await res.json();
                const tbody = document.getElementById('account-list');
                tbody.innerHTML = '';
                accounts.forEach(acc => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${acc.username}</td>
                        <td>${acc.role}</td>
                        <td>${new Date(acc.createdAt).toLocaleString()}</td>
                        <td>
                            ${acc.username !== currentUser.username ? `<button onclick="deleteAccount('${acc.username}')" style="background-color: var(--error-color)">删除</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        document.getElementById('create-account-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('new-username').value;
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;
            
            const res = await fetch('/api/accounts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });
            if (res.ok) {
                // Save for printing (local storage is simple)
                const tickets = JSON.parse(localStorage.getItem('new_tickets') || '[]');
                tickets.push({ username, password });
                localStorage.setItem('new_tickets', JSON.stringify(tickets));

                alert('账号创建成功');
                loadAccounts();
                e.target.reset();
            } else {
                alert('创建失败');
            }
        };

        async function deleteAccount(username) {
            if (!confirm(`确定要删除账号 ${username} 吗？`)) return;
            const res = await fetch('/api/accounts', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            if (res.ok) {
                loadAccounts();
            } else {
                alert('删除失败');
            }
        }

        document.getElementById('logout-link').onclick = async (e) => {
            e.preventDefault();
            await fetch('/api/logout');
            location.href = 'index.html';
        };

        init();
    </script>
</body>
</html>
