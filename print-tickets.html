<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>打印凭据 - 星河记忆</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: white; color: black; }
        .page {
            width: 210mm;
            padding: 10mm;
            margin: auto;
        }
        .ticket-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .ticket {
            border: 1px dashed #ccc;
            padding: 15px;
            position: relative;
            height: 50mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #f9f9f9;
        }
        .ticket .logo {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #302b63;
        }
        .ticket .info {
            font-size: 0.9rem;
            margin: 2px 0;
        }
        @media print {
            .no-print { display: none; }
            .page { padding: 0; margin: 0; }
        }
    </style>
</head>
<body>
    <div class="no-print" style="padding: 20px; text-align: center;">
        <button class="btn btn-primary" onclick="window.print()">立即打印</button>
        <p>提示：建议使用 Chrome 浏览器，开启“背景图形”打印选项。</p>
    </div>

    <div class="page">
        <div id="ticket-list" class="ticket-container">
            <!-- Tickets will be generated here -->
        </div>
    </div>

    <script>
        async function load() {
            const res = await fetch('/api/accounts');
            if (!res.ok) return;
            const accounts = await res.json();
            const container = document.getElementById('ticket-list');
            
            accounts.forEach(acc => {
                const ticket = document.createElement('div');
                ticket.className = 'ticket';
                ticket.innerHTML = `
                    <div class="logo">✨ 星河记忆纪念凭据</div>
                    <div class="info"><strong>用户名:</strong> ${acc.username}</div>
                    <div class="info"><strong>初始角色:</strong> ${acc.role}</div>
                    <div class="info"><strong>访问地址:</strong> ${window.location.origin}</div>
                    <div style="margin-top:10px; font-size:0.7rem; color:#666;">
                        注：请妥善保管账号，首次登录后建议修改密码。
                    </div>
                `;
                container.appendChild(ticket);
            });
        }
        load();
    </script>
</body>
</html>
