<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孔明灯 - 星河记忆</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/galaxy.js"></script>
    <style>
        .lantern-text {
            color: #5d4037;
            font-size: 11px;
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            line-height: 1.3;
            word-break: break-all;
        }
        .detail-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            color: #333;
            max-width: 400px;
            box-shadow: 0 0 40px rgba(255, 200, 0, 0.5);
            text-align: center;
        }
        .detail-card h3 {
            margin-top: 0;
            color: #f57c00;
        }
        .char-count {
            font-size: 0.8rem;
            opacity: 0.6;
            text-align: right;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <canvas id="galaxy-canvas"></canvas>

    <nav class="glass">
        <div class="logo">✨ 星河记忆</div>
        <div class="links">
            <a href="index.html">首页</a>
            <a href="alumni.html">同学录</a>
            <a href="lanterns.html">孔明灯</a>
            <a href="lanterns.html">孔明灯</a><a href="blog.html">星河博客</a>
            <a href="cosmos.html">小宇宙</a>
            <a href="admin.html" id="admin-link" class="hidden">管理后台</a>
            <a href="login.html" id="login-link">登录</a>
            <a href="#" id="logout-link" class="hidden">注销</a>
        </div>
    </nav>

    <main>
        <h1 style="text-align: center; margin-top: 1rem;">🏮 孔明灯寄语</h1>
        <p style="text-align: center; opacity: 0.8;">限短语寄语，让思念随风升入星河</p>
        
        <div id="lantern-field" class="lantern-container glass" style="margin: 2rem 0; background: rgba(0,0,0,0.4);">
            <!-- Lanterns will float here -->
        </div>

        <section class="glass" style="max-width: 800px; margin: 0 auto; padding: 2rem;">
            <h2>放飞新的灯火</h2>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <textarea id="lantern-input" placeholder="写下你的短语寄语 (限50字)..." maxlength="50" class="glass gradient-textarea" style="min-height: 150px !important;"></textarea>
                <div class="char-count"><span id="current-chars">0</span>/50</div>
                <button class="btn btn-primary" onclick="addLantern()" style="align-self: flex-end; padding: 0.8rem 2rem;">🚀 放飞</button>
            </div>
        </section>
    </main>

    <div id="preview-overlay" class="overlay">
        <div class="overlay-content"></div>
    </div>

    <script>
        const LANE_COUNT = 15;
        const laneStates = Array.from({ length: LANE_COUNT }, () => ({ busy: false, lastPos: -500 }));

        function getAvailableLane() {
            let bestLane = 0, bestPos = Infinity;
            for (let i = 0; i < LANE_COUNT; i++) {
                if (!laneStates[i].busy && laneStates[i].lastPos < bestPos) {
                    bestPos = laneStates[i].lastPos;
                    bestLane = i;
                }
            }
            return bestLane;
        }

        async function loadLanterns() {
            let list = [];
            try {
                const data = await Storage.readJSON('/db/lanterns.json');
                if (data && Array.isArray(data)) list = data;
            } catch (e) {}
            
            if (list.length === 0) {
                list = [{text: "祝大家前程似锦"}, {text: "江湖再见"}, {text: "永远少年"}, {text: "顶峰相见"}, {text: "星河长明"}];
            }
            
            list.forEach((m, i) => {
                setTimeout(() => createLantern(m.text), i * 1500);
            });
        }

        async function addLantern() {
            const text = document.getElementById('lantern-input').value.trim();
            if (!text) return;
            if (text.length > 50) { alert('寄语限50字以内'); return; }

            const user = Auth.getUser();
            if (!user) { alert('请先登录后再放飞孔明灯'); return; }

            try {
                let list = await Storage.readJSON('/db/lanterns.json') || [];
                list.push({ text, createdAt: Date.now(), author: user.username });
                await Storage.writeJSON('/db/lanterns.json', list);
                document.getElementById('lantern-input').value = '';
                document.getElementById('current-chars').textContent = '0';
                createLantern(text);
            } catch (e) {
                alert('放飞失败，请检查连接');
            }
        }

        function createLantern(text) {
            const container = document.getElementById('lantern-field');
            const lantern = document.createElement('div');
            lantern.className = 'lantern';
            
            const displayText = text.length > 20 ? text.substring(0, 18) + '...' : text;
            lantern.innerHTML = `<div class="lantern-text">${displayText}</div>`;
            
            const laneIndex = getAvailableLane();
            const laneWidth = 100 / LANE_COUNT;
            const startX = (laneIndex * laneWidth) + (laneWidth / 2) + (Math.random() - 0.5) * laneWidth * 0.5;
            lantern.style.left = `${startX}%`;
            
            const duration = 18 + Math.random() * 10;
            const delay = Math.random() * 5;
            lantern.style.animationDuration = `${duration}s`;
            lantern.style.animationDelay = `${delay}s`;
            
            laneStates[laneIndex].busy = true;
            laneStates[laneIndex].lastPos = Date.now();
            
            lantern.onclick = () => {
                const overlay = document.getElementById('preview-overlay');
                overlay.querySelector('.overlay-content').innerHTML = `
                    <div class="detail-card">
                        <h3>🏮 寄语详情</h3>
                        <p style="font-size: 1.2rem; line-height: 1.6; font-style: italic;">"${text}"</p>
                    </div>
                `;
                overlay.style.display = 'flex';
            };
            
            container.appendChild(lantern);
            setTimeout(() => {
                lantern.remove();
                laneStates[laneIndex].busy = false;
                spawnRandom();
            }, (duration + delay) * 1000);
        }

        async function spawnRandom() {
            try {
                const data = await Storage.readJSON('/db/lanterns.json');
                if (data && data.length > 0) {
                    createLantern(data[Math.floor(Math.random() * data.length)].text);
                }
            } catch (e) {}
        }

        // Input monitoring
        document.getElementById('lantern-input').oninput = function() {
            document.getElementById('current-chars').textContent = this.value.length;
        };

        setInterval(() => {
            if (document.querySelectorAll('.lantern').length < 8) spawnRandom();
        }, 4000);

        Galaxy.init();
        loadLanterns();

        const user = Auth.getUser();
        if (user) {
            document.getElementById('login-link').classList.add('hidden');
            document.getElementById('logout-link').classList.remove('hidden');
            if (user.role === 'head' || user.role === 'admin') document.getElementById('admin-link').classList.remove('hidden');
        }

        document.getElementById('preview-overlay').onclick = function() { this.style.display = 'none'; };
        document.getElementById('logout-link').onclick = (e) => { e.preventDefault(); Auth.logout(); location.href = 'index.html'; };
    </script>
</body>
</html>
