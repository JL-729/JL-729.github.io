<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言长廊 - 星河记忆</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/galaxy.js"></script>
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            padding: 1rem 0;
        }
        .gallery-post {
            padding: 1.2rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .gallery-post:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 32px 0 rgba(125, 95, 255, 0.3);
        }
        .gallery-post .post-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }
        .gallery-post .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .gallery-post .post-author {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .gallery-post .post-time {
            font-size: 0.8rem;
            opacity: 0.5;
        }
        .gallery-post .post-text {
            line-height: 1.7;
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .gallery-post .post-media {
            margin-bottom: 0.8rem;
            border-radius: 8px;
            overflow: hidden;
            max-height: 400px;
        }
        .gallery-post .post-media img,
        .gallery-post .post-media video {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 8px;
            display: block;
            cursor: pointer;
        }
        .gallery-post .post-actions {
            display: flex;
            gap: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--glass-border);
            font-size: 0.85rem;
        }
        .gallery-post .post-actions span {
            cursor: pointer;
            opacity: 0.7;
            transition: 0.2s;
        }
        .gallery-post .post-actions span:hover {
            opacity: 1;
            color: var(--primary-color);
        }
        .comments-section {
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: none;
        }
        .comments-section.open {
            display: block;
        }
        .comment-item {
            font-size: 0.85rem;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .comment-item .comment-author {
            color: var(--primary-color);
            font-weight: 600;
        }
        .comment-input-area {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .comment-input-area input {
            flex: 1;
            padding: 0.5rem 0.8rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.85rem;
        }
        .comment-input-area input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .comment-input-area button {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            border: none;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .toggle-comments {
            cursor: pointer;
            opacity: 0.6;
            font-size: 0.85rem;
        }
        .toggle-comments:hover {
            opacity: 1;
        }

        /* Lantern display */
        .lantern-wall {
            margin-bottom: 2rem;
        }

        /* Submit form */
        .submit-section textarea {
            width: 100%;
            min-height: 250px;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            font-family: inherit;
            background: #000;
            border: 2px solid transparent;
            background-image: linear-gradient(#000, #000), linear-gradient(to right, #7d5fff, #3ae374);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 10px;
        }
        .submit-section textarea:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(125, 95, 255, 0.3);
        }
        .submit-section input[type="file"] {
            color: white;
        }
        .submit-section input[type="file"]::file-selector-button {
            padding: 0.4rem 1rem;
            border-radius: 5px;
            border: none;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="galaxy-canvas"></canvas>

    <nav class="glass">
        <div class="logo">✨ 星河记忆</div>
        <div class="links">
            <a href="index.html">首页</a>
            <a href="alumni.html">同学录</a>
            <a href="gallery.html">留言长廊</a>
            <a href="cosmos.html">小宇宙</a>
            <a href="admin.html" id="admin-link" class="hidden">管理后台</a>
            <a href="login.html" id="login-link">登录</a>
            <a href="#" id="logout-link" class="hidden">注销</a>
        </div>
    </nav>

    <main>
        <h1 style="text-align: center;">🎭 留言长廊</h1>
        <p style="text-align: center; opacity: 0.7;">写下你的心声，分享你的故事</p>

        <!-- Lantern Section -->
        <section class="glass lantern-wall" style="padding: 1.5rem;">
            <h2 style="margin-top:0;">🏮 孔明灯寄语</h2>
            <div id="lantern-field" class="lantern-container" style="height:350px;"></div>
        </section>

        <!-- Submit Form -->
        <section class="glass submit-section" style="padding: 1.5rem; margin-top: 1.5rem;">
            <h2 style="margin-top:0;">✍️ 发布留言</h2>
            <div style="display:flex;flex-direction:column;gap:1rem;">
                <textarea id="post-text" placeholder="写下你想说的话...&#10;&#10;支持文字、图片和视频" class="gradient-textarea"></textarea>
                <input type="file" id="post-media" accept="image/*,video/*">
                <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="submitPost()">🚀 发布</button>
                    <span id="upload-status" style="font-size:0.85rem;opacity:0.7;"></span>
                </div>
            </div>
        </section>

        <!-- Gallery Posts -->
        <section style="margin-top: 2rem;">
            <h2>📝 留言列表</h2>
            <div id="gallery-grid" class="gallery-grid">
                <p style="text-align:center;grid-column:1/-1;opacity:0.6;">加载中...</p>
            </div>
        </section>
    </main>

    <div id="preview-overlay" class="overlay">
        <div class="overlay-content"></div>
    </div>

    <script>
        // ========== Lantern Engine (from confession.html) ==========
        const LANE_COUNT = 10;
        const laneStates = [];
        for (let i = 0; i < LANE_COUNT; i++) laneStates.push({ busy: false, lastPos: -500 });

        function getAvailableLane() {
            let bestLane = 0, bestPos = Infinity;
            for (let i = 0; i < LANE_COUNT; i++) {
                if (!laneStates[i].busy && laneStates[i].lastPos < bestPos) {
                    bestPos = laneStates[i].lastPos;
                    bestLane = i;
                }
            }
            if (bestPos === Infinity) {
                let minPos = Infinity;
                for (let i = 0; i < LANE_COUNT; i++) {
                    if (laneStates[i].lastPos < minPos) { minPos = laneStates[i].lastPos; bestLane = i; }
                }
            }
            return bestLane;
        }

        function createLantern(text, id) {
            const container = document.getElementById('lantern-field');
            const lantern = document.createElement('div');
            lantern.className = 'lantern';
            const displayText = text.length > 30 ? text.substring(0, 28) + '…' : text;
            lantern.innerHTML = `<div class="lantern-text">${displayText}</div>`;
            const laneIndex = getAvailableLane();
            const laneWidth = 100 / LANE_COUNT;
            const laneCenter = laneIndex * laneWidth + laneWidth / 2;
            const jitter = (Math.random() - 0.5) * laneWidth * 0.6;
            lantern.style.left = `${laneCenter + jitter}%`;
            const rotation = (Math.random() - 0.5) * 8;
            const duration = 16 + Math.random() * 8;
            const delay = Math.random() * 3;
            lantern.style.animationDuration = `${duration}s`;
            lantern.style.animationDelay = `${delay}s`;
            const scale = 0.85 + Math.random() * 0.3;
            lantern.style.transform = `rotate(${rotation}deg) scale(${scale})`;
            laneStates[laneIndex].busy = true;
            laneStates[laneIndex].lastPos = Date.now();

            lantern.onclick = () => {
                const overlay = document.getElementById('preview-overlay');
                overlay.querySelector('.overlay-content').innerHTML = `
                    <div class="detail-card" style="background:rgba(255,255,255,0.95);padding:25px;border-radius:10px;color:#333;max-width:400px;box-shadow:0 0 30px rgba(255,200,0,0.5);">
                        <h3 style="margin-top:0;color:#ff9800;">🏮 寄语详情</h3>
                        <p style="font-size:1.1rem;line-height:1.6;">${text}</p>
                    </div>
                `;
                overlay.style.display = 'flex';
            };
            container.appendChild(lantern);
            setTimeout(() => {
                lantern.remove();
                laneStates[laneIndex].busy = false;
                spawnRandomLantern();
            }, (duration + delay) * 1000);
        }

        let confessionCache = [];

        async function loadConfessions() {
            try {
                const data = await Storage.readJSON('/db/confessions.json');
                if (data && Array.isArray(data) && data.length > 0) {
                    confessionCache = data;
                }
            } catch (e) { /* ignore */ }
            if (confessionCache.length === 0) {
                confessionCache = [{text: "祝大家前程似锦"}, {text: "江湖再见"}, {text: "永远少年！"}, {text: "顶峰相见"}];
            }
            confessionCache.forEach((m, i) => setTimeout(() => createLantern(m.text), i * 1200));
        }

        async function spawnRandomLantern() {
            try {
                const data = await Storage.readJSON('/db/confessions.json');
                if (data && Array.isArray(data) && data.length > 0) {
                    const msg = data[Math.floor(Math.random() * data.length)];
                    createLantern(msg.text);
                }
            } catch (e) {}
        }

        setInterval(() => {
            const container = document.getElementById('lantern-field');
            const count = container.querySelectorAll('.lantern').length;
            if (count < 4) spawnRandomLantern();
        }, 5000);

        // ========== Gallery Posts ==========
        async function loadPosts() {
            const grid = document.getElementById('gallery-grid');
            try {
                const data = await Storage.readJSON('/gallery/data.json');
                const posts = data && data.posts ? data.posts : [];
                if (posts.length === 0) {
                    grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;opacity:0.6;">✨ 还没有留言，快来发布第一条吧！</p>';
                    return;
                }
                grid.innerHTML = '';
                posts.slice().reverse().forEach(post => renderPost(post, grid));
            } catch (e) {
                console.warn('[Gallery] 加载留言失败:', e);
                grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;opacity:0.6;">😴 留言长廊正在布置中...</p>';
            }
        }

        function renderPost(post, container) {
            const div = document.createElement('div');
            div.className = 'gallery-post glass glow-border';
            const time = post.createdAt ? new Date(post.createdAt).toLocaleString() : '';
            const avatarChar = post.author ? post.author.charAt(0).toUpperCase() : '?';
            const baseUrl = getBaseUrl();

            let mediaHtml = '';
            if (post.mediaUrl) {
                const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(post.mediaUrl);
                const isVideo = /\.(mp4|webm)$/i.test(post.mediaUrl);
                if (isImage) {
                    mediaHtml = `<div class="post-media"><img src="${post.mediaUrl}" alt="media" onclick="previewMedia('${post.mediaUrl}', 'img')"></div>`;
                } else if (isVideo) {
                    mediaHtml = `<div class="post-media"><video src="${post.mediaUrl}" muted controls onclick="previewMedia('${post.mediaUrl}', 'video')"></video></div>`;
                }
            }

            const comments = post.comments || [];
            const commentsHtml = comments.map(c =>
                `<div class="comment-item"><span class="comment-author">${c.author}</span>: ${c.text}</div>`
            ).join('');

            div.innerHTML = `
                <div class="post-header">
                    <div class="post-avatar">${avatarChar}</div>
                    <div>
                        <div class="post-author">${post.author || '匿名'}</div>
                        <div class="post-time">${time}</div>
                    </div>
                </div>
                <div class="post-text">${escapeHtml(post.text)}</div>
                ${mediaHtml}
                <div class="post-actions">
                    <span onclick="toggleComments(this)">💬 评论 (${comments.length})</span>
                    <span onclick="likePost('${post.id}')">❤️ ${post.likes || 0}</span>
                </div>
                <div class="comments-section">
                    ${commentsHtml}
                    <div class="comment-input-area">
                        <input type="text" placeholder="写评论..." class="comment-input">
                        <button onclick="addComment(this, '${post.id}')">发送</button>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        function toggleComments(el) {
            const section = el.closest('.gallery-post').querySelector('.comments-section');
            section.classList.toggle('open');
        }

        async function addComment(btn, postId) {
            const input = btn.previousElementSibling;
            const text = input.value.trim();
            if (!text) return;
            const user = Auth.getUser();
            if (!user) { alert('请先登录'); return; }

            try {
                const data = await Storage.readJSON('/gallery/data.json');
                const posts = data && data.posts ? data.posts : [];
                const post = posts.find(p => p.id === postId);
                if (!post) { alert('留言不存在'); return; }
                if (!post.comments) post.comments = [];
                post.comments.push({ author: user.username, text, createdAt: Date.now() });
                await Storage.writeJSON('/gallery/data.json', data);
                input.value = '';
                loadPosts();
            } catch (e) {
                console.error('[Gallery] 评论失败:', e);
                alert('评论失败: ' + e.message);
            }
        }

        async function likePost(postId) {
            try {
                const data = await Storage.readJSON('/gallery/data.json');
                const posts = data && data.posts ? data.posts : [];
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                post.likes = (post.likes || 0) + 1;
                await Storage.writeJSON('/gallery/data.json', data);
                loadPosts();
            } catch (e) { console.error('[Gallery] 点赞失败:', e); }
        }

        async function submitPost() {
            const text = document.getElementById('post-text').value.trim();
            const fileInput = document.getElementById('post-media');
            const status = document.getElementById('upload-status');

            if (!text && !fileInput.files.length) {
                alert('请填写留言内容或上传媒体文件');
                return;
            }

            const user = Auth.getUser();
            if (!user) { alert('请先登录后发布留言'); return; }

            status.textContent = '⏳ 发布中...';

            try {
                let mediaUrl = '';
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const ext = file.name.split('.').pop();
                    const fileName = `post_${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;

                    // Upload to gallery media folder
                    const baseUrl = getBaseUrl();
                    const auth = getAuthHeader();
                    const uploadPath = `/gallery/media/${fileName}`;
                    const fullUrl = `${baseUrl}${uploadPath}`;

                    const uploadRes = await fetch(fullUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Basic ${auth}`,
                            'Content-Type': file.type || 'application/octet-stream'
                        },
                        body: file
                    });

                    if (!uploadRes.ok) throw new Error('文件上传失败');
                    mediaUrl = `${baseUrl}${uploadPath}`;
                }

                const data = await Storage.readJSON('/gallery/data.json') || { posts: [] };
                if (!data.posts) data.posts = [];

                data.posts.push({
                    id: `post_${Date.now()}_${Math.random().toString(36).substr(2,8)}`,
                    text: text || '📎 分享了一段媒体',
                    mediaUrl,
                    author: user.username,
                    createdAt: Date.now(),
                    comments: [],
                    likes: 0
                });

                await Storage.writeJSON('/gallery/data.json', data);

                document.getElementById('post-text').value = '';
                fileInput.value = '';
                status.textContent = '✅ 发布成功！';
                loadPosts();
                // Also add to confessions for lanterns
                if (text) {
                    try {
                        let confessions = await Storage.readJSON('/db/confessions.json') || [];
                        if (!Array.isArray(confessions)) confessions = [];
                        confessions.push({ text, createdAt: Date.now(), author: user.username });
                        await Storage.writeJSON('/db/confessions.json', confessions);
                        createLantern(text);
                    } catch (e) { /* ignore */ }
                }
            } catch (e) {
                console.error('[Gallery] 发布失败:', e);
                status.textContent = '❌ 发布失败: ' + e.message;
            }
        }

        // ========== Utilities ==========
        function getBaseUrl() {
            if (!GALAXY_WEBDAV_URL) return '';
            const url = GALAXY_WEBDAV_URL.replace(/\/+$/, '');
            try {
                const parsed = new URL(url);
                return `${parsed.protocol}//${parsed.host}${parsed.pathname}`.replace(/\/+$/, '');
            } catch { return url; }
        }

        function getAuthHeader() {
            if (!GALAXY_WEBDAV_URL) return '';
            const match = GALAXY_WEBDAV_URL.match(/https?:\/\/([^:]+):([^@]+)@/);
            if (match) return btoa(`${match[1]}:${match[2]}`);
            return '';
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function previewMedia(url, type) {
            const overlay = document.getElementById('preview-overlay');
            const content = overlay.querySelector('.overlay-content');
            if (type === 'img') {
                content.innerHTML = `<img src="${url}" style="max-width:100%;max-height:100%;border-radius:10px;">`;
            } else {
                content.innerHTML = `<video src="${url}" controls autoplay style="max-width:100%;max-height:100%;border-radius:10px;"></video>`;
            }
            overlay.style.display = 'flex';
        }

        document.getElementById('preview-overlay').onclick = function() { this.style.display = 'none'; };
        document.getElementById('logout-link').onclick = (e) => { e.preventDefault(); Auth.logout(); location.reload(); };

        // ========== Init ==========
        Galaxy.init();

        const user = Auth.getUser();
        if (user) {
            document.getElementById('login-link').classList.add('hidden');
            if (user.role === 'admin' || user.role === 'head') {
                document.getElementById('admin-link').classList.remove('hidden');
            }
        }

        loadConfessions();
        loadPosts();
    </script>
</body>
</html>
