<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同学录 - 星河记忆</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/galaxy.js"></script>
    <style>
        .alumni-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
        }
        .polaroid {
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 250px;
            color: #333;
            text-align: center;
            border-radius: 3px;
            margin: 0 auto;
            transition: transform 0.3s;
        }
        .polaroid:hover {
            transform: rotate(0deg) scale(1.03);
        }
        .polaroid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 2px;
        }
        .polaroid .name {
            font-family: 'Kaiti', 'STKaiti', serif;
            font-size: 1.3rem;
            margin-top: 10px;
        }
        .polaroid .wish {
            color: #666;
            font-style: italic;
            margin-top: 5px;
            font-size: 0.9rem;
        }
        .view-toggle {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .view-toggle button {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .view-toggle button.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* List view */
        .alumni-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .alumni-list-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
        }
        .alumni-list-item img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .alumni-list-item .info {
            flex: 1;
        }
        .alumni-list-item .info .name {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .alumni-list-item .info .wish {
            opacity: 0.7;
            font-size: 0.9rem;
        }

        /* Editor styles */
        .editor-section {
            margin-top: 2rem;
        }
        .editor-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .editor-tabs button {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .editor-tabs button.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }
        .editor-panel {
            display: none;
        }
        .editor-panel.active {
            display: block;
        }
        .preset-grid {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .preset-item {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .preset-item:hover, .preset-item.selected {
            border-color: var(--primary-color);
            transform: scale(1.1);
        }
        .layout-options {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
        }
        .layout-options label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        /* Invitation */
        .invite-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        /* Camera */
        .camera-container {
            position: relative;
            margin-top: 1rem;
        }
        #camera-feed {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            display: none;
        }
        .camera-controls {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        /* Print styles */
        @media print {
            body { background: white !important; color: black !important; }
            #galaxy-canvas, nav, .no-print, .editor-section, .form-section { display: none !important; }
            .alumni-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }
            .polaroid {
                box-shadow: none !important;
                border: 1px solid #ddd;
                page-break-inside: avoid;
                transform: none !important;
            }
            .polaroid .name { color: #333; }
            .polaroid .wish { color: #666; }
        }

        /* Permissions & Filter */
        .filter-info {
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.6;
            margin-bottom: 1rem;
        }

        /* Improved Editor */
        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }
        .color-picker-container input[type="color"] {
            width: 50px;
            height: 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: transparent;
        }
    </style>
</head>
<body>
    <canvas id="galaxy-canvas"></canvas>

    <nav class="glass">
        <div class="logo">✨ 星河记忆</div>
        <div class="links">
            <a href="index.html">首页</a>
            <a href="alumni.html">同学录</a>
            <a href="lanterns.html">孔明灯</a><a href="blog.html">星河博客</a>
            <a href="cosmos.html">小宇宙</a>
            <a href="admin.html" id="admin-link" class="hidden">管理后台</a>
            <a href="login.html" id="login-link">登录</a>
            <a href="#" id="logout-link" class="hidden">注销</a>
        </div>
    </nav>

    <main>
        <h1 style="text-align: center;">🌟 星图同学录</h1>
        <p style="text-align: center;">每一颗星，都是一个闪光的你</p>

        <!-- View Toggle -->
        <div class="view-toggle no-print">
            <button class="active" onclick="switchView('grid')" id="view-grid">📷 卡片视图</button>
            <button onclick="switchView('list')" id="view-list">📋 列表视图</button>
        </div>

        <!-- Alumni Display -->
        <div id="alumni-container">
            <div id="filter-info" class="filter-info"></div>
            <div id="alumni-grid" class="alumni-grid">
                <p style="text-align:center;grid-column:1/-1;opacity:0.6;">加载中...</p>
            </div>
            <div id="alumni-list" class="alumni-list hidden"></div>
        </div>

        <!-- Editor Section -->
        <section class="glass editor-section no-print" style="padding: 1.5rem;">
            <h2>🎨 个性名片编辑器</h2>
            <div class="editor-tabs">
                <button class="active" onclick="switchEditorTab('basic', this)">📝 基本信息</button>
                <button onclick="switchEditorTab('style', this)">🎨 视觉定制</button>
                <button onclick="switchEditorTab('camera', this)">📸 拍照</button>
            </div>

            <!-- Basic Info Panel -->
            <div class="editor-panel active" id="panel-basic">
                <div style="display:flex;flex-direction:column;gap:1rem;">
                    <div style="display:grid;grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <input type="text" id="alumni-name" placeholder="你的姓名" class="glass gradient-input">
                        <input type="text" id="alumni-school" placeholder="学校/班级 (客观项)" class="glass gradient-input">
                    </div>
                    <input type="text" id="alumni-photo" placeholder="照片 URL（可选）" class="glass gradient-input">
                    <textarea id="alumni-wish" placeholder="你的寄语" class="glass gradient-input" style="min-height:80px;resize:vertical;"></textarea>
                    <input type="hidden" id="alumni-inviter">
                    <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                        <button class="btn btn-primary" onclick="addAlumni()">🌟 点亮我的星</button>
                        <button class="btn btn-success invite-btn" onclick="generateInvite()">✉️ 发出专属邀请</button>
                        <button class="btn btn-primary" onclick="window.print()">🖨️ 离线打印</button>
                    </div>
                </div>
            </div>

            <!-- Style Panel -->
            <div class="editor-panel" id="panel-style">
                <h3>预设背景</h3>
                <div class="preset-grid">
                    <div class="preset-item" style="background: linear-gradient(135deg, #667eea, #764ba2);" onclick="selectPreset(this, 'linear-gradient(135deg, #667eea, #764ba2)')">梦幻紫</div>
                    <div class="preset-item" style="background: linear-gradient(135deg, #f093fb, #f5576c);" onclick="selectPreset(this, 'linear-gradient(135deg, #f093fb, #f5576c)')">玫瑰红</div>
                    <div class="preset-item" style="background: linear-gradient(135deg, #4facfe, #00f2fe);" onclick="selectPreset(this, 'linear-gradient(135deg, #4facfe, #00f2fe)')">天空蓝</div>
                    <div class="preset-item" style="background: linear-gradient(135deg, #43e97b, #38f9d7);" onclick="selectPreset(this, 'linear-gradient(135deg, #43e97b, #38f9d7)')">薄荷绿</div>
                    <div class="preset-item" style="background: #000000; border: 1px solid #444;" onclick="selectPreset(this, '#000000')">纯黑</div>
                </div>
                
                <div class="color-picker-container">
                    <label>主题色：</label>
                    <input type="color" id="theme-color" value="#7d5fff" onchange="updatePreview()">
                    <label>文字色：</label>
                    <input type="color" id="text-color" value="#ffffff" onchange="updatePreview()">
                </div>

                <h3>自定义背景图 (直连 WebDAV)</h3>
                <input type="file" id="bg-upload" accept="image/*" onchange="uploadFile(this, 'bg')">
                <div id="bg-preview" style="margin-top:0.5rem;"></div>
            </div>

            <!-- Camera Panel -->
            <div class="editor-panel" id="panel-camera">
                <div class="camera-container">
                    <video id="camera-feed" autoplay playsinline></video>
                    <div class="camera-controls">
                        <button class="btn btn-primary" onclick="startCamera()">📸 打开摄像头</button>
                        <button class="btn btn-success" onclick="capturePhoto()">📷 拍照</button>
                        <button class="btn btn-danger" onclick="stopCamera()">⏹️ 关闭</button>
                    </div>
                    <canvas id="capture-canvas" style="display:none;"></canvas>
                    <div id="captured-preview" style="margin-top:0.5rem;"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="preview-overlay" class="overlay">
        <div class="overlay-content"></div>
    </div>

    <script>
        let currentView = 'grid';
        let selectedPreset = null;
        let customBgUrl = null;
        let mediaStream = null;
        let capturedPhotoData = null;

        // ========== Load Alumni ==========
        async function loadAlumni() {
            let alumni = [];
            try {
                const data = await Storage.readJSON('/db/alumni.json');
                if (data && Array.isArray(data)) {
                    alumni = data;
                }
            } catch (e) {
                console.warn('[Alumni] 加载校友数据失败:', e);
            }

            const currentUser = Auth.getUser();
            const filterInfo = document.getElementById('filter-info');
            
            // Filter: 填写的同学录仅发起邀请的同学可见
            let filteredAlumni = alumni;
            if (currentUser && currentUser.role !== 'head') {
                filteredAlumni = alumni.filter(a => 
                    a.inviter === currentUser.username || 
                    a.name === currentUser.username ||
                    a.username === currentUser.username
                );
                filterInfo.textContent = `当前展示：由我邀请或属于我的名片 (${filteredAlumni.length}/${alumni.length})`;
            } else if (!currentUser) {
                filteredAlumni = [];
                filterInfo.textContent = '请登录后查看你邀请的同学录';
            } else {
                filterInfo.textContent = `管理员模式：展示所有名片 (${alumni.length})`;
            }

            renderGrid(filteredAlumni);
            renderList(filteredAlumni);
        }

        function renderGrid(alumni) {
            const grid = document.getElementById('alumni-grid');
            grid.innerHTML = '';
            if (alumni.length === 0) {
                grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;opacity:0.6;padding:2rem;">暂无名片可显示</p>';
                return;
            }
            alumni.forEach(person => {
                const wrapper = document.createElement('div');
                wrapper.style.display = 'flex';
                wrapper.style.justifyContent = 'center';
                const polaroid = document.createElement('div');
                polaroid.className = 'polaroid';
                
                const style = person.style || {};
                if (style.bgColor) polaroid.style.background = style.bgColor;
                if (style.bgImage) {
                    polaroid.style.backgroundImage = `url(${style.bgImage})`;
                    polaroid.style.backgroundSize = 'cover';
                    polaroid.style.backgroundPosition = 'center';
                }
                if (style.textColor) polaroid.style.color = style.textColor;
                
                polaroid.innerHTML = `
                    <img src="${person.photo}" alt="${person.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(person.name)}&background=7d5fff&color=fff&size=200'">
                    <div class="name">${person.name}</div>
                    ${person.school ? `<div style="font-size:0.8rem;opacity:0.8;">${person.school}</div>` : ''}
                    <div class="wish">💬 ${person.wish}</div>
                `;
                polaroid.onclick = () => showCard(person);
                wrapper.appendChild(polaroid);
                grid.appendChild(wrapper);
            });
        }

        function renderList(alumni) {
            const list = document.getElementById('alumni-list');
            list.innerHTML = '';
            alumni.forEach(person => {
                const item = document.createElement('div');
                item.className = 'alumni-list-item glass';
                item.innerHTML = `
                    <img src="${person.photo}" alt="${person.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(person.name)}&background=7d5fff&color=fff&size=200'">
                    <div class="info">
                        <div class="name">${person.name} ${person.school ? `<span style="font-size:0.8rem;opacity:0.6;">(${person.school})</span>` : ''}</div>
                        <div class="wish">💬 ${person.wish}</div>
                    </div>
                `;
                item.onclick = () => showCard(person);
                list.appendChild(item);
            });
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('view-grid').classList.toggle('active', view === 'grid');
            document.getElementById('view-list').classList.toggle('active', view === 'list');
            document.getElementById('alumni-grid').classList.toggle('hidden', view !== 'grid');
            document.getElementById('alumni-list').classList.toggle('hidden', view !== 'list');
        }

        async function uploadFile(input, type) {
            if (!input.files.length) return null;
            const file = input.files[0];
            try {
                const fileName = `${type}_${Date.now()}_${Math.random().toString(36).substr(2,6)}.${file.name.split('.').pop()}`;
                const path = `/alumni/assets/${fileName}`;
                const res = await Storage.put(path, file);
                if (res) {
                    const url = `${Storage.getBaseUrl()}${path}`;
                    if (type === 'bg') {
                        customBgUrl = url;
                        document.getElementById('bg-preview').innerHTML = `<img src="${url}" style="max-width:200px;border-radius:8px;margin-top:0.5rem;">`;
                    }
                    return url;
                }
            } catch (e) {
                console.error('[Alumni] 上传失败:', e);
                alert('上传失败');
            }
            return null;
        }

        async function addAlumni() {
            const name = document.getElementById('alumni-name').value.trim();
            const school = document.getElementById('alumni-school').value.trim();
            let photo = document.getElementById('alumni-photo').value.trim();
            const wish = document.getElementById('alumni-wish').value.trim();
            const inviter = document.getElementById('alumni-inviter').value;

            if (!name) { alert('请填写姓名'); return; }

            if (capturedPhotoData) {
                const base64Data = capturedPhotoData.replace(/^data:image\/\w+;base64,/, '');
                const byteChars = atob(base64Data);
                const byteNums = new Array(byteChars.length);
                for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
                const byteArray = new Uint8Array(byteNums);
                const blob = new Blob([byteArray], { type: 'image/png' });
                const path = `/alumni/assets/capture_${Date.now()}.png`;
                await Storage.put(path, blob);
                photo = `${Storage.getBaseUrl()}${path}`;
                capturedPhotoData = null;
            }

            const entry = {
                name, school,
                photo: photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=7d5fff&color=fff&size=200`,
                wish: wish || '前程似锦！',
                inviter: inviter || (Auth.getUser() ? Auth.getUser().username : 'system'),
                createdAt: Date.now(),
                style: {
                    bgColor: selectedPreset || document.getElementById('theme-color').value,
                    bgImage: customBgUrl || undefined,
                    textColor: document.getElementById('text-color').value
                }
            };

            try {
                let alumni = await Storage.readJSON('/db/alumni.json') || [];
                alumni.push(entry);
                await Storage.writeJSON('/db/alumni.json', alumni);
                alert('✨ 名片已保存！');
                location.reload();
            } catch (e) {
                alert('保存失败');
            }
        }

        function switchEditorTab(tab, btn) {
            document.querySelectorAll('.editor-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.editor-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${tab}`).classList.add('active');
        }

        function selectPreset(el, value) {
            document.querySelectorAll('.preset-item').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            selectedPreset = value;
            customBgUrl = null;
        }

        async function startCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                const video = document.getElementById('camera-feed');
                video.srcObject = mediaStream;
                video.style.display = 'block';
            } catch (e) { alert('无法打开摄像头: ' + e.message); }
        }

        function capturePhoto() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('capture-canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            capturedPhotoData = canvas.toDataURL('image/png');
            document.getElementById('captured-preview').innerHTML = `<img src="${capturedPhotoData}" style="max-width:200px;border-radius:8px;border:2px solid var(--primary-color);"><p style="font-size:0.85rem;opacity:0.7;">✅ 已捕捉原图</p>`;
        }

        function stopCamera() {
            if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
            document.getElementById('camera-feed').style.display = 'none';
        }

        function generateInvite() {
            const user = Auth.getUser();
            if (!user) { alert('请先登录'); return; }
            const inviteUrl = `${window.location.origin}${window.location.pathname}?mode=add&inviter=${user.username}&school=${encodeURIComponent('星河学院')}`;
            const text = `🌟 星河记忆：由 ${user.username} 发起的邀请！\n\n链接：${inviteUrl}`;
            if (navigator.clipboard) { navigator.clipboard.writeText(text).then(() => alert('✅ 邀请链接已复制！')); }
            else { alert('邀请链接：' + inviteUrl); }
        }

        (function init() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('mode') === 'add') {
                document.getElementById('alumni-inviter').value = params.get('inviter') || '';
                document.getElementById('alumni-school').value = params.get('school') || '';
                setTimeout(() => document.querySelector('.editor-section').scrollIntoView(), 500);
            }
            Galaxy.init();
            loadAlumni();
            const user = Auth.getUser();
            if (user) {
                document.getElementById('login-link').classList.add('hidden');
                document.getElementById('logout-link').classList.remove('hidden');
                if (user.role === 'head' || user.role === 'admin') document.getElementById('admin-link').classList.remove('hidden');
            }
        })();

        function showCard(person) {
            const overlay = document.getElementById('preview-overlay');
            const content = overlay.querySelector('.overlay-content');
            const style = person.style || {};
            let css = `background: ${style.bgColor || '#fff'}; color: ${style.textColor || '#333'};`;
            if (style.bgImage) css += `background-image: url(${style.bgImage}); background-size: cover; background-position: center;`;
            content.innerHTML = `<div class="polaroid" style="${css} max-width: 400px; padding: 20px;"><img src="${person.photo}" style="width:100%; border-radius: 5px;"><h2 style="margin: 15px 0 5px;">${person.name}</h2><p style="opacity: 0.7; font-size: 0.9rem;">${person.school || ''}</p><hr style="opacity: 0.2; margin: 15px 0;"><div style="font-size: 1.1rem; line-height: 1.6; font-style: italic;">${person.wish}</div><div style="margin-top: 20px; font-size: 0.7rem; opacity: 0.5;">邀请人: ${person.inviter || '未知'}</div></div>`;
            overlay.style.display = 'flex';
        }

        document.getElementById('preview-overlay').onclick = function() { this.style.display = 'none'; };
        document.getElementById('logout-link').onclick = (e) => { e.preventDefault(); Auth.logout(); location.href = 'index.html'; };
    </script>
</body>
</html>
