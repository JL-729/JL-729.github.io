<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星河记忆 - 我们的毕业纪念</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars-container">
        <div class="star-layer star-layer-1"></div>
        <div class="star-layer star-layer-2"></div>
        <div class="star-layer star-layer-3"></div>
    </div>

    <nav class="glass">
        <div class="logo">✨ 星河记忆</div>
        <div class="links">
            <a href="index.html">首页</a>
            <a href="alumni.html">同学录</a>
            <a href="confession.html">表白墙</a>
            <a href="admin.html" id="admin-link" class="hidden">管理后台</a>
            <a href="login.html" id="login-link">登录</a>
            <a href="#" id="logout-link" class="hidden">注销</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1>星河长明，记忆永存</h1>
            <p>在那片星空下，我们曾共同走过。这不仅仅是一个网站，更是我们共同拥有的星系。</p>
        </section>

        <section id="exhibition">
            <h2 style="text-align: center; margin-bottom: 2rem;">记忆展览馆</h2>
            <div id="grid" class="grid">
                <!-- Items will be loaded here -->
            </div>
        </section>
    </main>

    <div id="preview-overlay" class="overlay">
        <div class="overlay-content"></div>
    </div>

    <script>
        async function checkAuth() {
            const res = await fetch('/api/me');
            if (res.ok) {
                const user = await res.json();
                document.getElementById('login-link').classList.add('hidden');
                document.getElementById('logout-link').classList.remove('hidden');
                if (user.role === 'admin' || user.role === 'head') {
                    document.getElementById('admin-link').classList.remove('hidden');
                }
            }
        }

        async function loadContent() {
            const res = await fetch('/api/content?type=approved');
            const items = await res.json();
            const grid = document.getElementById('grid');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card glass glow-border';
                
                const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(item.name);
                const isVideo = /\.(mp4|webm)$/i.test(item.name);

                if (isImage) {
                    card.innerHTML = `<img src="${item.url}" alt="${item.name}" onclick="preview('${item.url}', 'img')">`;
                } else if (isVideo) {
                    card.innerHTML = `<video src="${item.url}" muted onmouseover="this.play()" onmouseout="this.pause()" onclick="preview('${item.url}', 'video')"></video>`;
                }
                
                grid.appendChild(card);
            });
        }

        function preview(url, type) {
            const overlay = document.getElementById('preview-overlay');
            const content = overlay.querySelector('.overlay-content');
            if (type === 'img') {
                content.innerHTML = `<img src="${url}" style="max-width:100%; max-height:100%;">`;
            } else {
                content.innerHTML = `<video src="${url}" controls autoplay style="max-width:100%; max-height:100%;"></video>`;
            }
            overlay.style.display = 'flex';
        }

        document.getElementById('preview-overlay').onclick = function() {
            this.style.display = 'none';
        };

        document.getElementById('logout-link').onclick = async (e) => {
            e.preventDefault();
            await fetch('/api/logout');
            location.reload();
        };

        checkAuth();
        loadContent();
    </script>
</body>
</html>
