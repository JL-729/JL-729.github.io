<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星河记忆 - 我们的毕业纪念</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/galaxy.js"></script>
</head>
<body>
    <canvas id="galaxy-canvas"></canvas>

    <nav class="glass">
        <div class="logo">✨ 星河记忆</div>
        <div class="links">
            <a href="index.html">首页</a>
            <a href="alumni.html">同学录</a>
            <a href="lanterns.html">孔明灯</a><a href="blog.html">星河博客</a>
            <a href="cosmos.html">小宇宙</a>
            <a href="admin.html" id="admin-link" class="hidden">管理后台</a>
            <a href="login.html" id="login-link">登录</a>
            <a href="#" id="logout-link" class="hidden">注销</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1>星河长明，记忆永存</h1>
            <p>在那片星空下，我们曾共同走过。这不仅仅是一个网站，更是我们共同拥有的星系。</p>
        </section>

        <section id="exhibition">
            <h2 style="text-align: center; margin-bottom: 2rem;">记忆展览馆</h2>
            <div id="grid" class="grid">
                <!-- Items will be loaded here -->
            </div>
        </section>
    </main>

    <div id="preview-overlay" class="overlay">
        <div class="overlay-content"></div>
    </div>

    <script>
        function initAuth() {
            const user = Auth.getUser();
            if (user) {
                document.getElementById('login-link').classList.add('hidden');
                document.getElementById('logout-link').classList.remove('hidden');
                if (user.role === 'admin' || user.role === 'head') {
                    document.getElementById('admin-link').classList.remove('hidden');
                }
            }
        }

        async function loadContent() {
            const grid = document.getElementById('grid');
            
            try {
                // Try to load approved content from WebDAV
                const files = await Storage.list('/exhibition/approved');
                
                if (!files || files.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">暂无展览内容，敬请期待 ✨</p>';
                    return;
                }

                for (const filePath of files) {
                    const name = filePath.split('/').pop();
                    if (!name) continue;
                    
                    const card = document.createElement('div');
                    card.className = 'card glass glow-border';
                    
                    // Build the full URL to the file
                    const baseUrl = getBaseUrl();
                    const fileUrl = `${baseUrl}/exhibition/approved/${name}`;
                    
                    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(name);
                    const isVideo = /\.(mp4|webm)$/i.test(name);

                    if (isImage) {
                        card.innerHTML = `<img src="${fileUrl}" alt="${name}" onclick="preview('${fileUrl}', 'img')">`;
                    } else if (isVideo) {
                        card.innerHTML = `<video src="${fileUrl}" muted onmouseover="this.play()" onmouseout="this.pause()" onclick="preview('${fileUrl}', 'video')"></video>`;
                    } else {
                        continue;
                    }
                    
                    grid.appendChild(card);
                }
            } catch (e) {
                console.warn('[Index] 加载展览内容失败:', e);
                grid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">😴 展览馆正在布置中...</p>';
            }
        }

        function getBaseUrl() {
            if (!GALAXY_WEBDAV_URL) return '';
            const url = GALAXY_WEBDAV_URL.replace(/\/+$/, '');
            try {
                const parsed = new URL(url);
                return `${parsed.protocol}//${parsed.host}${parsed.pathname}`.replace(/\/+$/, '');
            } catch {
                return url;
            }
        }

        function preview(url, type) {
            const overlay = document.getElementById('preview-overlay');
            const content = overlay.querySelector('.overlay-content');
            if (type === 'img') {
                content.innerHTML = `<img src="${url}" style="max-width:100%; max-height:100%;border-radius:10px;">`;
            } else {
                content.innerHTML = `<video src="${url}" controls autoplay style="max-width:100%; max-height:100%;border-radius:10px;"></video>`;
            }
            overlay.style.display = 'flex';
        }

        document.getElementById('preview-overlay').onclick = function() {
            this.style.display = 'none';
        };

        document.getElementById('logout-link').onclick = (e) => {
            e.preventDefault();
            Auth.logout();
            location.reload();
        };

        Galaxy.init();
        initAuth();
        loadContent();
    </script>
</body>
</html>
