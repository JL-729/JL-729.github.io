<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 星河记忆</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0b0d17;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
        }
        nav {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #a0c4ff;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        h1 {
            font-size: 3rem;
            color: #a0c4ff;
            text-shadow: 0 0 10px rgba(160, 196, 255, 0.5);
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #ccc;
        }
        button.logout {
            background: none;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button.logout:hover {
            background: #ff6b6b;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <nav>
        <div class="logo">星河记忆</div>
        <div class="user-info" id="userInfo" style="display: none;">
            <span id="displayUsername"></span>
            <button class="logout" onclick="logout()">退出</button>
        </div>
    </nav>
    <div class="content">
        <h1>欢迎来到星河记忆</h1>
        <p>穿越时光的尘埃，记录永恒的瞬间。</p>
    </div>
    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        } else {
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('displayUsername').textContent = localStorage.getItem('username');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
